name: Cypress QA Automation Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name:  Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Run Login Tests
        run: npm run cy:run:login

      - name: Run Cart Tests
        run: npm run cy:run:cart

      - name: Generate HTML Report
        run: |
          npx mochawesome-merge cypress/reports/*.json > cypress/reports/final-report.json
          npx marge cypress/reports/final-report.json --reportDir cypress/reports/html --inline
        if: always()

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-reports
          path: |
            cypress/reports/html/
            cypress/screenshots/
            cypress/videos/
          retention-days: 7

      - name: Upload Screenshots on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
          retention-days: 7